<!DOCTYPE html>
<html lang="en">
<head>
    <title>Just Like Home</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
        }

        body, html {
            height: 100%;
            margin: 0;
        }

        .main-block {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
            align-items: center;
            justify-content: center;

        }

        .main-item {
            display: flex;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .earth {
            max-width: 100%;
            max-height: 100%;

        }


        .main-link {
            cursor: pointer;
        }

        .main-text {
            font-size:  3rem;
            color:white;
            text-align: left;
            margin-top: 0;
            margin-bottom: 0;
        }

        .title-text {
            margin-top: 0;
            font-size:  4rem;
            text-align: center;
            color: black;
        }


        .title {
            border-color: black;
            background-image: linear-gradient(to top, #b721ff 0%, #21d4fd 100%);
            background-size: 100%;
            border-style: solid;
            border-radius: 10px;
            display: flex;
            width: 30%;
            text-align: center;
            justify-content: center;
            align-items: center;
            box-shadow: 1 1 6 9 rgba(0, 0, 0, 0.8);
        }

        .headers {
            display: flex;
            flex-direction: column;
            margin-top: 0px;
            width: 100%;
            height: 30%;


        }

        @media (max-width: 600px) {
        /* Styles for screens with a maximum width of 600px */
            .main-item {
                width: 60%; /* Set the width to 100% of the container */
            }
            .main-item:hover {
                width: 80%;
                transition: all 0.35s;
            }

            .main-item:hover:after {
                width: 60%;
                transition: all 0.35s;
            }

            .main-text {
                font-size: 1rem;
            }

            .title-text {
                font-size: 1rem;
            }
        }

        @media (min-width: 601px) and (max-width: 900px) {
        /* Styles for screens with a minimum width of 601px and maximum width of 900px */
            .main-item {
                width: 50%; /* Set the width to 50% of the container */
            }
            .main-item:hover {
                width: 80%;
                transition: all 0.35s;
            }

            .main-item:hover:after {
                width: 50%;
                transition: all 0.35s;
            }

            .main-text {
                font-size: 2rem;
            }

            .title-text {
                font-size: 2rem;
            }
        }

        @media (min-width: 901px) {
        /* Styles for screens with a minimum width of 901px */
            .main-item {
                width: 33.33%; /* Set the width to 33.33% of the container */
            }
            .main-item:hover {
                width: 45%;
                transition: all 0.35s;
            }

            .main-item:hover:after {
                width: 33.33%;
                transition: all 0.35s;
            }

            .main-text {
                font-size: 2rem;
            }

            .title-text {
                font-size: 3rem;
            }
        }




        
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo"><i class="fas fa-globe"></i> JUST LIKE HOME</a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Home</a>
                </li>
                <li class="navbar__item">
                    <a href="/services.html" class="navbar__links">Services near you</a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">Products near you</a>
                </li>
                <li class="navbar__btn"><a href="login_signup.html" target="_blank"
                class="button">Login/Sign Up</a></li>
            </ul>
        </div> 
    </nav>

    <div class="headers">
        <div>
            <p class="main-text">
                What part of the world makes you feel... 
            </p>
        </div>
            
        <div class="title">
            <p class="title-text">
                JUST LIKE HOME
            </p>
        </div>
    </div>
    
     

    

    <div class="main-block">
        <div class="main-item">
            <a class="main-link" href="services.html">
                <img class="earth" src="images/earth.jpg" alt="icon">
            </a>
        </div>
        
    </div>

   
    <script src="app.js"></script>
    
</body>
</html>
