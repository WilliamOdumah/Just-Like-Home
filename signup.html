<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/SignUp - Just Like Home</title>
    <style>

        body{
            background-color: black;
        }

        .title-block {
            align-items: center;
        }

        .title {
            font-size: 40px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            color: white;
        }


        .info-block {
            border: none;
            box-shadow: 10px 5px 4px 4px rgba(0, 0, 0, 0.4);
            padding-top: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            padding-right: 20px;
            margin-bottom: 30px;
            width: 550px;
            margin-left: 25% ;
        }

        .p-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            color: gray;
            margin-top: 0;
            margin-bottom: 0;
        }


        .btn-block {
            vertical-align: middle;
            text-align: center;
            align-self: center;
            margin-bottom: 10px;
        }

        .login-btn {
            background-color: red;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-radius: 360px;
            border: none;
            padding-top: 20px;
            padding-bottom: 20px;
            padding-right: 50px;
            padding-left: 50px;
            cursor: pointer;
            font-size: 20px;
        }


        .signup-btn {
            background-color: rgb(0, 140, 255);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-radius: 360px;
            border: none;
            padding-top: 20px;
            padding-bottom: 20px;
            padding-right: 40px;
            padding-left: 40px;
            cursor: pointer;
            font-size: 20px;
        }

        .txt-boxes {
            border-style: solid;
            border-color: black;
            box-shadow: 6px 6px 6px rgba(0, 0, 0, 0.4);
            width: 500px;
            height: 50px;
            margin-bottom: 20px;
            border-width: 3px;
        }

        .login-btn:hover {
            padding-top: 25px;
            padding-bottom: 25px;
            padding-right: 60px;
            padding-left: 60px;
        }

        .signup-btn:hover {
            padding-top: 25px;
            padding-bottom: 25px;
            padding-right: 50px;
            padding-left: 50px;
        }

        .email-block {
            margin-top: 10px;
            margin-bottom: 1px;
        }

        .password-block {
            margin-top: 10px;
            margin-bottom: 1px;
        }


        .login-page {
        }

    </style>
</head>
<body>
    <div class="login-page">
        <div>
            <p class="title">SIGN UP</p>
            
            <div class="info-block">
                    <p class="p-text">Email:</p>
                </div>
                <div>
                    <input class="txt-boxes" type="text" placeholder="Enter your email">
                </div>
                <div class="password-block">
                    <p class="p-text">Password:</p>
                </div>
                <div>
                    <input class="txt-boxes" type="password" placeholder="Enter your password">
                </div>
            </div>
            <div class="btn-block">
                <button class="login-btn" ><a href="index.html">Register</button>
            </div> 
        </div>
    </div>
    
    
</body>
</html>
