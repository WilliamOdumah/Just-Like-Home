<!DOCTYPE html>
<html lang="en">
<head>
    <title>Just Like Home</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .service {
            border: black;
            border-style: solid;
            height: 200px;
            margin-top: 20px;
            margin-bottom: 60px;
        }

        .logo {
            height: 80px;
            width: 80px;
            border: black;
            border-style: solid;
            margin-top: 5px;
            margin-left: 5px;
            display: inline-block;
        }


        .details {
            display: inline-block;
            vertical-align: top;
            height: 180px;
            width: 440px;
            border: black;
            border-style: solid;
            margin-top: 5px;
            margin-left: 5px;
        }

        
        .name {
            display: inline-block;
            vertical-align: top;
            height: 40px;
            width: 200px;
            border: black;
            border-style: solid;
            margin-top: 5px;
            margin-left: 5px;
        }

        .intro {
            vertical-align: top;
            height: 120px;
            width: 420px;
            border: black;
            border-style: solid;
            margin-top: 5px;
            margin-left: 5px;
        }

        .service-btn {
            vertical-align: middle;
            width: 60px;
            height: 40px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }

        .service-btn:hover {
            border-style: solid;
            border-color: black;
            transition: all 0.1s;
        }
    </style>
</head>
